<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Youtube to Luma Key WebM (Alerts)</title>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <link rel="preconnect" href="https://fonts.gstatic.com" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/fontawesome.min.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />
    <link rel="preconnect" href="https://fonts.gstatic.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Cairo:wght@200;300;400;600;700;900&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        /* transition: all 0.25s linear; */
        outline: none;
        font-family: "Cairo", "Poppins", sans-serif;
        box-sizing: border-box;
      }
      body {
        height: 100vh;
        margin: 0;
        padding: 0;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        background: rgb(28, 28, 29);
      }
      #inputs {
        padding: 1em;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        width: 1000px;
        height: 400px;
        border: 1px solid rgb(48, 48, 48);
        border-radius: 2.5em;
      }
      input {
        border: none;
        width: 100%;
        height: 100%;
        background: rgb(48, 48, 49);
        border-radius: 1em;
        text-align: center;
        color: whitesmoke;
        font-size: 1.5em;
      }
      input:focus {
        background: rgb(57, 57, 58);
      }
      label {
        color: rgb(109, 109, 109);
      }
      #ytId {
        height: 50%;
        margin-bottom: 1em;
      }
      .options {
        width: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 1.5%;
      }
      #options {
        height: 50%;
      }
      .options input {
        background: rgb(33, 33, 34);
        border: 1px solid rgb(48, 48, 49);
        border-radius: 0.5em;
        height: 100%;
      }
      .options input:focus {
        background: rgb(48, 48, 49);
      }
      #options div {
        height: 100%;
        display: flex;
        flex-direction: column;
        gap: 0.25em;
      }
      #advancedContainer {
        background: rgb(24, 24, 24);
        padding: 1em;
        border-radius: 1.25em;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        margin-top: 2%;
      }
      #advancedLabel {
        font-size: 1.5em;
        color: rgb(160, 160, 160);
        margin-bottom: 1%;
      }
      div.line {
        width: 100%;
        height: 2px;
        margin-bottom: 2%;
        background: rgb(39, 39, 39);
      }
      #convertBtn {
        width: 50%;
        height: 100%;
        border-radius: 0.5em;
        border: none;
        background: rgb(90, 117, 207);
        color: rgb(15, 23, 51);
        font-size: 2em;
        font-weight: 500;
      }
      #convertBtn:hover {
        background: rgb(63, 96, 206);
        cursor: pointer;
      }
      #convertBtn:active {
        background: rgb(42, 72, 170);
        border: none !important;
      }
    </style>
  </head>
  <body>
    <div id="inputs">
      <input placeholder="رابط اليوتيوب" type="text" name="ytId" id="ytId" />
      <div id="options" class="options">
        <div>
          <label for="start">البداية:</label>
          <input placeholder="e.g. 00:00" type="text" name="start" id="start" />
        </div>
        <div>
          <label for="end">المدة:</label>
          <input placeholder="e.g. 00:20" type="text" name="end" id="end" />
        </div>
        <div>
          <label for="outputName">اسم الملف:</label>
          <input type="text" name="outputName" id="outputName" />
        </div>
        <button id="convertBtn" onclick="convert()">Convert</button>
      </div>
      <div id="advancedContainer">
        <span id="advancedLabel">Advanced </span>
        <div class="line"></div>
        <div id="advanced" class="options">
          <div>
            <label for="threshold">Threshold:</label>
            <input
              placeholder="Default: 0"
              type="text"
              name="threshold"
              id="threshold"
            />
          </div>
          <div>
            <label for="tolerance">Tolerance:</label>
            <input
              placeholder="Default: 0.2"
              type="text"
              name="tolerance"
              id="tolerance"
            />
          </div>
          <div>
            <label for="softness">Softness:</label>
            <input
              placeholder="Default: 0.4"
              type="text"
              name="softness"
              id="softness"
            />
          </div>
          <div>
            <label for="quality">Quality (4-63):</label>
            <input
              placeholder="Best = 4"
              type="text"
              name="quality"
              id="quality"
            />
          </div>
        </div>
      </div>
    </div>
    <script>
      //   function test() {
      //     let youtubeId;
      //     if (!$("#ytId").val().split("/").pop().match(/watch/)) {
      //       youtubeId = $("#ytId").val().split("/").pop();
      //     } else {
      //       youtubeId = $("#ytId").val().split("/").pop().split("=").pop();
      //     }
      //     //console.log(youtubeId.match(/watch/));
      //     //console.log(typeof youtubeId);
      //     console.log(youtubeId);
      //     console.log(
      //       `/convert/${youtubeId}/00:${$("#start").val()}/00:${$(
      //         "#end"
      //       ).val()}/${$("#threshold").val() ? $("#threshold").val : "0"}/${
      //         $("#tolerance").val() ? $("#tolerance").val : "0.4"
      //       }/${$("#softness").val() ? $("#softness").val : "0.2"}/${$(
      //         "#outputName"
      //       ).val()}`
      //     );
      //   }
      function convert() {
        if (
          $("#ytId").val() &&
          $("#start").val() &&
          $("#end").val() &&
          $("#outputName").val()
        ) {
          $("#convertBtn").html('<i class="fa fa-circle-o-notch fa-spin"></i>');
          let youtubeId;
          if (!$("#ytId").val().split("/").pop().match(/watch/)) {
            youtubeId = $("#ytId").val().split("/").pop();
          } else {
            youtubeId = $("#ytId").val().split("/").pop().split("=").pop();
          }
          $.get(
            `/convert/${youtubeId}/00:${$("#start").val()}/00:${$(
              "#end"
            ).val()}/${$("#threshold").val() ? $("#threshold").val : "0"}/${
              $("#tolerance").val() ? $("#tolerance").val : "0.4"
            }/${$("#softness").val() ? $("#softness").val : "0.2"}/${$(
              "#outputName"
            ).val()}/${$("#quality").val ? $("#quality").val : "30"}`,
            (data) => {
              //let vid = document.createElement("video");
              //vid.src = data;
              //vid.controls = true;
              //vid.autoplay = true;
              //vid.id = "previewVid";
              //document.body.appendChild(vid);
              window.open(data, "_blank");
            }
          );
          $("#convertBtn").html("Convert");
        } else {
          $("#convertBtn").html("Error");
          $("#convertBtn").css("backgroundColor", "rgb(207, 90, 90)");
        }
      }
    </script>
  </body>
</html>
